      name: "chromium"
      channel: "chrome"  # 使用系统安装的 Chrome 浏览器，无需额外下载
      slow_mo_ms: 0
      launch_args: []
  test:
    base_url: "https://example.com"
    headless: true
    default_timeout_ms: 12000
