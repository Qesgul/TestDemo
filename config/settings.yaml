      name: "chromium"
      channel: ""
      slow_mo_ms: 0
      launch_args: []
  prod:
    base_url: "https://example.com"
    headless: true
    default_timeout_ms: 15000
    browser:
      name: "chromium"
      channel: ""
      slow_mo_ms: 0
      launch_args: []
