default_suite: core

suites:
  - id: smoke
    name: 快速检查
    description: 最短路径回归
    aliases: ["快速检查"]
    tags: ["quick", "smoke"]
    cases:
      - tests/cases/test_check_popup.py::TestPopupDefaultDisplay::test_homepage_popup_default_display

  - id: core
    name: 核心功能
    description: 主业务回归
    aliases: ["核心功能"]
    tags: ["core", "main"]
    cases:
      - tests/cases/test_homepage.py::TestHomePage::test_homepage_elements_displayed
      - tests/cases/test_login.py::TestLogin::test_login_success
      - tests/cases/test_check_popup.py::TestPopupDefaultDisplay::test_homepage_popup_default_display

  - id: popup
    name: 弹窗专项
    description: 弹窗相关测试集合
    aliases: ["弹窗专项"]
    tags: ["popup", "ui"]
    cases:
      - tests/cases/test_check_popup.py
      - tests/cases/test_popup_handling.py
