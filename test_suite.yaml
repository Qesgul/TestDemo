# 知末网自动化测试套件配置

# 测试分组配置
groups:
  - name: "快速检查"
    description: "快速验证关键功能"
    tags: ["quick", "smoke"]
    cases:
      - file: "tests/cases/test_check_popup.py"
        case: "TestPopupDefaultDisplay::test_homepage_popup_default_display"

  - name: "核心功能"
    description: "运行核心业务功能测试"
    tags: ["core", "main"]
    cases:
      - file: "tests/cases/test_homepage.py"
        case: "TestHomePage::test_homepage_elements_displayed"
      - file: "tests/cases/test_login.py"
        case: "TestLogin::test_login_success"
      - file: "tests/cases/test_check_popup.py"
        case: "TestPopupDefaultDisplay::test_homepage_popup_default_display"

  - name: "弹框专项"
    description: "弹框相关所有测试"
    tags: ["popup", "ui"]
    cases:
      - file: "tests/cases/test_check_popup.py"
      - file: "tests/cases/test_popup_handling.py"

# 标签配置（供测试用例使用）
available_tags:
  - name: "quick"
    description: "快速检查用例，执行时间短"
  - name: "smoke"
    description: "冒烟测试用例"
  - name: "core"
    description: "核心功能用例"
  - name: "main"
    description: "主要业务流程"
  - name: "popup"
    description: "弹框相关测试"
  - name: "ui"
    description: "界面元素测试"

# 执行配置
execution:
  default_mode: "group"
  default_group: "核心功能"
  default_tags: []
  # 并发执行配置
  parallel:
    # 是否启用并发执行
    enabled: true
    # 并发进程数（建议设置为 CPU 核心数或略少于核心数）
    # 注意：Playwright 浏览器并发会占用较多资源，建议设置为 2-4
    workers: 2
    # 并发策略：file（按文件）、class（按类）、function（按函数）
    # file: 每个测试文件在一个 worker 中执行
    # class: 每个测试类在一个 worker 中执行
    # function: 每个测试函数在一个 worker 中执行
    dist_mode: "file"
  # 失败重试配置
  retry:
    # 是否启用失败重试
    enabled: true
    # 最大重试次数（建议 1-3 次）
    max_reruns: 1
    # 每次重试之间的延迟（秒）
    reruns_delay: 1
    # 仅对标记为 flaky 的用例重试（false 表示对所有失败用例重试）
    only_flaky: false

# 报告配置
allure:
  enabled: true
  results_dir: "allure-results"
  report_dir: "allure-report"
  clean_results: true
  open_report: true
  report_title: "知末网自动化测试报告"
