[pytest]
testpaths = tests/cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 默认参数：-q（简洁输出）-s（显示打印内容）
# 注意：xdist 的 -n 参数不在此配置，而是在命令行或 test_suite.yaml 中指定
addopts = -q -s --headed

# 失败重试配置（pytest-rerunfailures）
# --reruns N: 失败后重试 N 次
# --reruns-delay S: 每次重试之间等待 S 秒
# 这些参数也可以通过命令行覆盖
# addopts = -q -s --reruns 2 --reruns-delay 1

markers =
    quick: 快速检查用例，执行时间短
    smoke: 冒烟测试用例
    core: 核心功能用例
    main: 主要业务流程
    popup: 弹框相关测试
    ui: 界面元素测试
    flaky: 标记不稳定的测试用例，默认会重试
    no_diagnostics: 禁用诊断信息捕获
    gio_capture: 启用 GIO JS Hook 埋点采集
